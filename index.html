<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Política de Privacidade</title>
<link rel="preload" href="https://imgur.com/JrT6BK5.jpg" as="image">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#000 url('https://imgur.com/JrT6BK5.jpg') center/cover no-repeat fixed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:2.5rem;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.modal h2{font-size:1.4rem;font-weight:600;margin-bottom:1rem;color:#111}
.modal p{font-size:.95rem;color:#444;line-height:1.6;margin-bottom:1.5rem}
.btns{display:flex;flex-direction:column;gap:.75rem}
.btn{display:block;padding:.85rem;border-radius:10px;text-decoration:none;font-weight:600;font-size:1rem;transition:transform .15s}
.btn:hover{transform:scale(1.02)}
.btn-accept{background:#10b981;color:#fff}
.btn-decline{background:#e5e7eb;color:#333}
</style>
</head>
<body>
<div class="overlay">
<div class="modal">
<h2>Política de Privacidade</h2>
<p>Coletamos dados para melhorar sua experiência e não compartilhamos suas informações com terceiros. Você pode solicitar acesso ou exclusão dos seus dados a qualquer momento.</p>
<div class="btns">
<a href="https://ev.braip.com/campanhas/cpa/cam44zv86" class="btn btn-accept">Aceito</a>
<a href="https://ev.braip.com/campanhas/cpa/cam44zv86" class="btn btn-decline">Não Aceito</a>
</div>
</div>
</div>
</body>
</html>
